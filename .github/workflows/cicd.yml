# .github/workflows/deploy.yml
name: ML Model CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the repository source code
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Configure Python environment matching your application setup
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'
        cache: 'pip'

    # 3. Install core project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Generate the model artifact dynamically during build time
    - name: Train and generate ML model
      run: |
        python app/train.py

    # 5. Verify local application runs correctly using basic Python check
    - name: Run code validation checks
      run: |
        python -m compileall app/app.py

    # 6. Build the production Docker container artifact
    - name: Build production Docker image
      run: |
        docker build -t ml-flask-app:${{ github.sha }} .

    # 7. Mock Production Cloud Release Step
    - name: Simulated Cloud Deployment
      run: |
        echo "Successfully deployed version ${{ github.sha }} to target production environment."


